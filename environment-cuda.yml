name: kan-cgcnn-cuda
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy>=1.26
  - pandas>=2.2,<3
  - scipy
  - scikit-learn
  - pymatgen
  - matminer
  - monty
  - pymongo
  - joblib
  - tqdm
  - pytest>=8
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.11.0+cu128
      - torch-geometric>=2.5
